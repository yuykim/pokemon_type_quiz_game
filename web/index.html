<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="포켓몬 타입 상성 연습 — 공격·방어 배율과 최적 선택" />
    <title>타입 상성 연습</title>
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/type-tiles.css" />
    <link rel="stylesheet" href="css/screens.css" />
    <link rel="stylesheet" href="css/mobile.css" />
  </head>
  <body>
    <div id="app" class="app">
      <main id="view-setup" class="view"></main>
      <main id="view-play" class="view" hidden></main>
      <main id="view-summary" class="view" hidden></main>
    </div>
    <script>
      if (location.protocol === "file:") {
        var app = document.getElementById("app");
        app.innerHTML =
          '<main class="view"><section class="card">' +
          "<h2>실행 방법 안내</h2>" +
          "<p>브라우저에서 파일을 직접 열면(file://) 보안 정책 때문에 실행되지 않습니다.</p>" +
          "<p><code>web</code> 폴더에서 로컬 서버를 켠 뒤 접속해 주세요.</p>" +
          "<pre>cd web\nnpx --yes serve .</pre>" +
          "<p>그다음 <code>http://localhost:3000</code> 같은 주소로 접속하면 됩니다.</p>" +
          "</section></main>";
      } else {
        var script = document.createElement("script");
        script.type = "module";
        script.src = "js/app.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
